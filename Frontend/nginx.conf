# nginx config for serving the React single-page app.
server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # SPA routing: React Router owns the URLs. If a requested path isn't a real
    # file (e.g. /app/dashboard), fall back to index.html so the app can render
    # it — otherwise nginx would return 404. This mirrors the Vercel "rewrites"
    # rule in vercel.json.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache the fingerprinted build assets (index-abc123.js) aggressively —
    # their names change on every build, so this is always safe.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
